# Memory & Performance (Tuned for 16GB RAM)
# Increases the heap size so the build doesn't freeze at 8%
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# Gives the Kotlin compiler its own dedicated memory to prevent the 'Daemon' crash
kotlin.daemon.jvmargs=-Xmx2048m

# Speed Boosts
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.vfs.watch=true

# Android Configuration
android.useAndroidX=true
android.enableJetifier=true

# Standard Architecture (Keep this false for stability in your student project)
newArchEnabled=false
hermesEnabled=true

# Network stability (Helps fix the "Connection Reset" / SSL failures)
systemProp.https.protocols=TLSv1.2,TLSv1.3
systemProp.http.keepAlive=true

# Architecture (Only builds what's needed for your current emulator/phone)
# Use 'x86_64' for standard emulators or 'arm64-v8a' for physical phones
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64